name: Test patched python-blosc2 registry

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  registry:
    name: Registry tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt -r requirements-test.txt
          python -m pip install cython numpy h5py hdf5plugin

      - name: Checkout patched python-blosc2
        uses: actions/checkout@v4
        with:
          repository: alemirone/python-blosc2
          ref: add_j2k_htj2k_custom_codecs
          path: python-blosc2

      - name: Install patched python-blosc2
        run: python -m pip install --no-build-isolation ./python-blosc2

      - name: Install plugin under test
        run: python -m pip install --no-build-isolation .

      - name: Run registry-aware tests
        env:
          BLOSC2_EXPECT_GLOBAL_CODEC_IDS: "1"
          BLOSC_TRACE: "1"
        run: python -m pytest --import-mode=importlib -q "${{ github.workspace }}/tests" -k 'global_registry or manifest or available_backend or hdf5 or diagnose or cli'
        working-directory: ${{ runner.temp }}
