name: Test python-blosc2 registry

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  registry:
    name: Registry tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ninja on Windows
        if: runner.os == 'Windows'
        uses: turtlesec-no/get-ninja@main

      - name: Install MSVC amd64 on Windows
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt -r requirements-test.txt
          python -m pip install cython numpy h5py hdf5plugin

      - name: Patch Grok static bundling for clang-cl
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @'
          diff --git a/cmake/BundleStatic.cmake b/cmake/BundleStatic.cmake
          index 421358f..9b9e000 100644
          --- a/cmake/BundleStatic.cmake
          +++ b/cmake/BundleStatic.cmake
          @@ -58,7 +58,19 @@ function(bundle_static_library tgt_name bundled_tgt_name)
             set(bundled_tgt_full_name
               ${CMAKE_BINARY_DIR}/bin/${CMAKE_STATIC_LIBRARY_PREFIX}${bundled_tgt_name}${CMAKE_STATIC_LIBRARY_SUFFIX})
           
          -  if (CMAKE_CXX_COMPILER_ID MATCHES "Clang|GNU")
          +  if(MSVC)
          +    set(ar_tool ${CMAKE_AR})
          +
          +    foreach(tgt IN LISTS static_libs)
          +      list(APPEND static_libs_full_names $<TARGET_FILE:${tgt}>)
          +    endforeach()
          +
          +    add_custom_command(
          +      COMMAND ${ar_tool} /NOLOGO /OUT:${bundled_tgt_full_name} ${static_libs_full_names}
          +      OUTPUT ${bundled_tgt_full_name}
          +      COMMENT "Bundling ${bundled_tgt_name}"
          +      VERBATIM)
          +  elseif (CMAKE_CXX_COMPILER_ID MATCHES "Clang|GNU")
               file(WRITE ${CMAKE_BINARY_DIR}/${bundled_tgt_name}.ar.in
                 "CREATE ${bundled_tgt_full_name}\n" )
           
          @@ -84,18 +96,6 @@ function(bundle_static_library tgt_name bundled_tgt_name)
                 OUTPUT ${bundled_tgt_full_name}
                 COMMENT "Bundling ${bundled_tgt_name}"
                 VERBATIM)
          -  elseif(MSVC)
          -    set(ar_tool ${CMAKE_AR})
          -
          -    foreach(tgt IN LISTS static_libs)
          -      list(APPEND static_libs_full_names $<TARGET_FILE:${tgt}>)
          -    endforeach()
          -
          -    add_custom_command(
          -      COMMAND ${ar_tool} /NOLOGO /OUT:${bundled_tgt_full_name} ${static_libs_full_names}
          -      OUTPUT ${bundled_tgt_full_name}
          -      COMMENT "Bundling ${bundled_tgt_name}"
          -      VERBATIM)
             else()
               message(FATAL_ERROR "Unknown bundle scenario!")
             endif()
          '@ | git -C src/grok apply -

      - name: Install plugin under test
        if: runner.os != 'Windows'
        run: python -m pip install --no-build-isolation .

      - name: Install plugin under test on Windows
        if: runner.os == 'Windows'
        env:
          CC: clang-cl
          CXX: clang-cl
          CMAKE_GENERATOR: Ninja
          CMAKE_ARGS: -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        run: python -m pip install --no-build-isolation .

      - name: Run registry-aware tests
        env:
          BLOSC2_EXPECT_GLOBAL_CODEC_IDS: "1"
          BLOSC_TRACE: "1"
        run: python -m pytest --import-mode=importlib -q "${{ github.workspace }}/tests" -k '(global_registry or manifest or available_backend or roundtrip or diagnose or cli) and not hdf5'
        working-directory: ${{ runner.temp }}
